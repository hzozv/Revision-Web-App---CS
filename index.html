<!DOCTYPE HTML>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="description" content="Revision Web App">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <!-- Upper: Logo, Dashboard, Account Settings -->
        <div id="upper_section">
            <img id="logo" src="revision-web-app-logo.png" alt="Revision Web App Logo" width="150">
            <span id="dashboard_title">Dashboard</span>
            <button id="account_settings">
                <img src="account-settings-logo.png" alt="Account Settings" width="150">
            </button>
        </div>

        <!-- Middle: Greeting Msg, Level, XP Progression Bar, Recommended Learning -->
        <div id="middle_section">
            <h1 id="welcome_msg">Welcome, user!</h1>
            <label id="xp_label">
                Level <span id="current_lvl">1</span> (XP: <span id="current_xp">0</span>/<span id="current_max_xp">20</span>), Total (XP: <span id="total_xp">0</span>)
            </label>
            <progress id="xp_bar" value="0" max="20" title="You need 20 more XP to reach Level 2!"></progress>
            <h2 id="recommendation_msg">We recommend learning this next...</h2>
            <button id="recommendation">Recommendation (Placeholder)</button>
            <button onclick="add_xp()">Add 6 XP! (Testing)</button>
            <button onclick="reset()">Reset Local Storage (Testing)</button>
            <button onclick="save()">Save to Local Storage (Testing)</button>

        </div>

        <!-- Bottom: Quick Navigation to different sections / functions e.g. quiz, flashcards... -->
        <section id="lower_section">
            <p>This part has not been completed...</p>
        </section>
        
        <script src="script.js"></script>
    </body>
</html>
